<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calcol — Mi Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Css/variables.css">
  <link rel="stylesheet" href="Css/components.css">  
  <link rel="stylesheet" href="Css/perfil.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <img class="logo" src="Imagenes/General/doky-calcol-logo.png" alt="Calcol">
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="pages/menu.html">Menú</a></li>
      <li><a href="promociones.html">Promociones</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>
    <a class="btn-nav-cta" href="login.html">Login</a>
  </nav>

  <div class="perfil-wrap">
    <div class="perfil-card">

      <!-- AVATAR -->
      <div class="avatar-wrap">
        <div class="avatar" id="avatar-iniciales"></div>
        <div class="avatar-info">
          <h1 id="perfil-nombre">Cargando...</h1>
          <span class="badge-rol" id="perfil-rol"></span>
        </div>
      </div>

      <!-- DATOS -->
      <div class="datos-wrap">
        <h2 class="seccion-titulo">Mis datos</h2>

        <div class="dato-item">
          <span class="dato-label">Nombre</span>
          <span class="dato-valor" id="dato-nombre"></span>
        </div>

        <div class="dato-item">
          <span class="dato-label">Correo</span>
          <span class="dato-valor" id="dato-email"></span>
        </div>

        <div class="dato-item">
          <span class="dato-label">Teléfono</span>
          <span class="dato-valor" id="dato-tel"></span>
        </div>

        <div class="dato-item">
          <span class="dato-label">Rol</span>
          <span class="dato-valor" id="dato-rol"></span>
        </div>
      </div>

      <!-- ACCIONES -->
      <div class="acciones-wrap">
        <button class="btn-cerrar" id="btn-cerrar">
          <img src="Imagenes/General/icono-perfil.png" alt="" width="18" height="18"/>
          Cerrar sesión
        </button>

         <button class="btn-eliminar" id="btn-eliminar">
          <img src="Imagenes/Carrito/bote-de-basura.png" alt="eliminar" width="18" height="18"/>
           Eliminar mi cuenta
        </button>
      </div>

    </div>
  </div>

  <!-- MODAL CONFIRMAR ELIMINAR -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>¿Eliminar tu cuenta?</h3>
      <p>Esta acción no se puede deshacer. Se borrarán todos tus datos.</p>
      <div class="modal-btns">
        <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
        <button class="btn-confirmar-eliminar" id="btn-confirmar-eliminar">Sí, eliminar</button>
      </div>
    </div>
  </div>

  <script src="JS/perfil.js"></script>
  <script src="JS/navbar.js"></script>
</body>
</html>
